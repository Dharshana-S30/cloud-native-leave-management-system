{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>My Leaves</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<h2 style="text-align:center;">My Leave History</h2>

<table border="1" style="margin:auto; width:70%; text-align:center;">
    <tr>
        <th>Start Date</th>
        <th>End Date</th>
        <th>Status</th>
    </tr>

    {% for leave in leaves %}
    <tr>
        <td>{{ leave.start_date }}</td>
        <td>{{ leave.end_date }}</td>
        <td>{{ leave.status }}</td>
    </tr>
    {% endfor %}
</table>

<div style="text-align:center; margin-top:20px;">
    <a href="/employee/">Back</a>
</div>

</body>
</html>
